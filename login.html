<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LOGIC_ENGINE_V2 - Authentication</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4edea3",
                        "surface-container": "#191a1a",
                        "surface-container-lowest": "#000000",
                        "surface": "#0e0e0e",
                        "on-surface": "#e7e5e5",
                        "on-primary": "#004a31",
                        "outline-variant": "#484848",
                        "secondary": "#979ead",
                        "secondary-container": "#353c48",
                        "on-secondary-container": "#b9bfcf",
                        "background": "#0e0e0e",
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden h-screen flex flex-col">
    <!-- TopNavBar -->
    <nav class="bg-[#191a1a] flex justify-between items-center w-full px-3 h-12 border-b border-[#252626] z-50">
        <div class="flex items-center gap-6">
            <span class="font-['Space_Grotesk'] font-bold text-[#4edea3] tracking-tighter text-lg">LOGIC_ENGINE_V2</span>
            <div class="flex items-center gap-1 font-['Inter'] text-sm tracking-tight">
                <button onclick="window.location.href='logic.html'" class="px-3 py-1 text-[#979ead] hover:bg-[#252626] transition-colors">Workspace</button>
                <button onclick="window.location.href='learn.html'" class="px-3 py-1 text-[#979ead] hover:bg-[#252626] transition-colors">Learn Modes</button>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="window.location.href='login.html'" class="flex items-center gap-2 bg-secondary-container text-on-secondary-container border border-secondary-container px-3 py-1 rounded-sm text-xs font-bold active:opacity-80 transition-all">Sign In</button>
            <button onclick="window.location.href='signup.html'" class="flex items-center gap-2 bg-primary text-on-primary border border-primary px-3 py-1 rounded-sm text-xs font-bold hover:bg-[#004a31] hover:text-[#4edea3] active:opacity-80 transition-all">Register</button>
        </div>
    </nav>
    
    <main class="flex-1 bg-surface relative flex items-center justify-center p-6">
        <div class="bg-surface-container w-full max-w-sm border border-outline-variant/30 rounded-lg shadow-2xl p-8 relative overflow-hidden">
            <!-- Left accent line -->
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
            
            <div class="flex items-center gap-2 mb-6">
                <span class="material-symbols-outlined text-primary text-2xl" data-icon="terminal">terminal</span>
                <h1 class="font-['Space_Grotesk'] text-xl text-primary tracking-widest font-bold">SYSTEM_LOGIN</h1>
            </div>
            
            <form action="logic.html" class="flex flex-col gap-5">
                <div class="flex flex-col gap-1.5">
                    <label class="font-label text-[10px] uppercase text-secondary tracking-widest">Username / Node ID</label>
                    <input type="text" class="bg-surface-container-lowest border border-outline-variant/30 text-on-surface p-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm" placeholder="Enter credential" required/>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="font-label text-[10px] uppercase text-secondary tracking-widest">Passkey</label>
                    <input type="password" class="bg-surface-container-lowest border border-outline-variant/30 text-on-surface p-2 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm" placeholder="••••••••" required/>
                </div>
                
                <button type="submit" class="mt-4 bg-primary text-on-primary font-bold py-2 rounded-sm active:scale-[0.98] transition-transform tracking-widest hover:bg-[#6ffbbe]">AUTHENTICATE</button>
            </form>
            <div class="mt-6 text-center text-xs text-secondary font-label">
                No active session? <a href="signup.html" class="text-primary hover:underline hover:text-[#6ffbbe]">Request access instance.</a>
            </div>
        </div>
    </main>
</body>
</html>
