<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Gate Simulator - Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        .node {
            position: absolute;
            background: white;
            border: 2px solid #555;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 80px;
            text-align: center;
            user-select: none;
            cursor: grab;
            z-index: 10;
        }
        .node:active { cursor: grabbing; z-index: 20; }
        .port {
            width: 14px; height: 14px;
            background: #cbd5e1; border: 2px solid #64748b;
            border-radius: 50%;
            position: absolute;
            cursor: crosshair;
        }
        .port:hover { background: #3b82f6; border-color: #2563eb; transform: scale(1.2); }
        .port.in { left: -7px; top: 50%; transform: translateY(-50%); }
        .port.in-1 { left: -7px; top: 30%; transform: translateY(-50%); }
        .port.in-2 { left: -7px; top: 70%; transform: translateY(-50%); }
        .port.out { right: -7px; top: 50%; transform: translateY(-50%); }
        
        .bg-grid {
            background-size: 20px 20px;
            background-image:
              linear-gradient(to right, #e2e8f0 1px, transparent 1px),
              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        }

        /* Phase 4: Wire Animations */
        @keyframes wireflow {
            to { stroke-dashoffset: -20; }
        }
        .wire-active {
            stroke-dasharray: 10 10;
            animation: wireflow 0.5s linear infinite;
        }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans">
    <nav class="bg-blue-700 text-white p-4 shadow-md z-30 flex justify-between items-center">
        <h1 class="text-xl font-bold">Logic Gate Simulator</h1>
        <div class="flex gap-4">
            <a href="learn.html" class="hover:text-blue-200 mt-1">Learn Modes</a>
            <button onclick="clearCanvas()" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 font-semibold shadow">Clear Workspace</button>
            <!-- Phase 4 Export JSON Button -->
            <button onclick="exportCircuit()" class="bg-indigo-500 px-3 py-1 rounded hover:bg-indigo-600 font-semibold shadow text-white">Export (.json)</button>
            <button onclick="saveCircuit()" class="bg-green-500 px-3 py-1 rounded hover:bg-green-600 font-semibold shadow">Save to Browser</button>
            <button onclick="loadCircuit()" class="bg-blue-500 px-3 py-1 rounded hover:bg-blue-600 font-semibold shadow">Load</button>
        </div>
    </nav>
    <div class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar -->
        <div class="w-64 bg-white border-r shadow-lg p-4 z-20 flex flex-col gap-2 overflow-y-auto">
            <!-- Phase 4 Undo/Redo Visual Controls -->
            <div class="flex gap-2 mb-2 w-full">
                <button onclick="undo()" class="flex-1 p-2 border rounded bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold shadow-sm" title="Undo (Ctrl+Z)">⟲ Undo</button>
                <button onclick="redo()" class="flex-1 p-2 border rounded bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold shadow-sm" title="Redo (Ctrl+Y)">Redo ⟳</button>
            </div>

            <h2 class="font-bold text-gray-700 mb-2 border-b pb-2">Components</h2>
            <div class="text-sm text-gray-500 mb-2">Click to add to canvas. Wiring goes from right to left.</div>
            
            <button onclick="addNode('input')" class="p-2 border rounded bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold text-left pl-4">👉 Signal Input</button>
            <button onclick="addNode('output')" class="p-2 border rounded bg-green-50 hover:bg-green-100 text-green-700 font-bold mb-4 text-left pl-4">🏁 Signal Output</button>
            
            <button onclick="addNode('AND')" class="p-2 border rounded hover:bg-gray-100 text-left pl-4 font-semibold">AND Gate</button>
            <button onclick="addNode('OR')" class="p-2 border rounded hover:bg-gray-100 text-left pl-4 font-semibold">OR Gate</button>
            <button onclick="addNode('NOT')" class="p-2 border rounded hover:bg-gray-100 text-left pl-4 font-semibold">NOT Gate</button>
            <button onclick="addNode('XOR')" class="p-2 border rounded hover:bg-gray-100 text-left pl-4 font-semibold">XOR Gate</button>
            <button onclick="addNode('NAND')" class="p-2 border rounded hover:bg-gray-100 text-left pl-4 font-semibold">NAND Gate</button>
            <button onclick="addNode('NOR')" class="p-2 border rounded hover:bg-gray-100 text-left pl-4 font-semibold">NOR Gate</button>
        </div>
        
        <!-- Canvas -->
        <div id="canvas" class="flex-1 relative bg-grid cursor-default overflow-hidden">
            <svg id="wires" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"></svg>
            <div id="nodes-container" class="absolute top-0 left-0 w-full h-full pointer-events-auto z-10"></div>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const nodesContainer = document.getElementById('nodes-container');
    const svgWires = document.getElementById('wires');

    let state = {
        nodes: [],
        connections: [], // { fromNode, fromPort, toNode, toPort }
        nextNodeId: 1
    };

    // Phase 4: History Stack Initialization
    let historyStack = [];
    let historyIndex = -1;

    let dragging = { node: null, offsetX: 0, offsetY: 0, hasMoved: false };
    let wiring = { active: false, fromNode: null, fromPort: null, startX: 0, startY: 0 };

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);

    // Phase 4 Tools
    // Ctrl+Z and Ctrl+Y listeners
    window.addEventListener('keydown', (e) => {
        if((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
        if((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
    });

    function saveHistory() {
        const stateCopy = {
            nodes: JSON.parse(JSON.stringify(state.nodes)),
            connections: JSON.parse(JSON.stringify(state.connections)),
            nextNodeId: state.nextNodeId
        };
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(stateCopy);
        historyIndex++;
    }

    function undo() {
        if(historyIndex > 0) {
            historyIndex--;
            const data = historyStack[historyIndex];
            state.nodes = JSON.parse(JSON.stringify(data.nodes));
            state.connections = JSON.parse(JSON.stringify(data.connections));
            state.nextNodeId = data.nextNodeId;
            renderNodes(); evaluateGraph();
        }
    }

    function redo() {
        if(historyIndex < historyStack.length - 1) {
            historyIndex++;
            const data = historyStack[historyIndex];
            state.nodes = JSON.parse(JSON.stringify(data.nodes));
            state.connections = JSON.parse(JSON.stringify(data.connections));
            state.nextNodeId = data.nextNodeId;
            renderNodes(); evaluateGraph();
        }
    }

    function exportCircuit() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "logic_circuit.json");
        dlAnchorElem.click();
    }

    function addNode(type) {
        const id = 'node_' + state.nextNodeId++;
        const node = { id, type, x: 100 + Math.random()*100, y: 100 + Math.random()*100, value: 0 };
        state.nodes.push(node);
        renderNodes();
        evaluateGraph();
        saveHistory();
    }

    function renderNodes() {
        nodesContainer.innerHTML = '';
        state.nodes.forEach(node => {
            const el = document.createElement('div');
            el.className = 'node';
            el.style.left = node.x + 'px';
            el.style.top = node.y + 'px';
            el.id = node.id;
            
            let html = `<div class="bg-gray-200 py-1 px-4 text-xs font-bold rounded-t-lg border-b border-gray-400 capitalize">${node.type}</div>`;
            
            if (node.type === 'input') {
                html += `<div class="p-2 flex justify-center"><button onclick="toggleInput('${node.id}')" class="w-10 h-10 ${node.value ? 'bg-green-500' : 'bg-red-500'} text-white text-lg font-bold rounded-full shadow hover:scale-105 transition-transform active:scale-95 cursor-pointer">${node.value}</button></div>`;
                html += `<div class="port out" onmousedown="startWire(event, '${node.id}', 'out')"></div>`;
            } 
            else if (node.type === 'output') {
                html += `<div class="p-2 flex justify-center"><div class="w-10 h-10 ${node.value ? 'bg-green-500' : 'bg-red-500'} text-white text-lg font-bold rounded-full shadow flex items-center justify-center">${node.value}</div></div>`;
                html += `<div class="port in" onmousedown="startWire(event, '${node.id}', 'in')" onmouseup="endWire(event, '${node.id}', 'in')"></div>`;
            }
            else if (node.type === 'NOT') {
                html += `<div class="p-4 text-lg font-bold">NOT</div>`;
                html += `<div class="port in" onmousedown="startWire(event, '${node.id}', 'in')" onmouseup="endWire(event, '${node.id}', 'in')"></div>`;
                html += `<div class="port out" onmousedown="startWire(event, '${node.id}', 'out')"></div>`;
            }
            else { // Logic gates with 2 inputs
                html += `<div class="p-4 text-lg font-bold">${node.type}</div>`;
                html += `<div class="port in-1" onmousedown="startWire(event, '${node.id}', 'in-1')" onmouseup="endWire(event, '${node.id}', 'in-1')"></div>`;
                html += `<div class="port in-2" onmousedown="startWire(event, '${node.id}', 'in-2')" onmouseup="endWire(event, '${node.id}', 'in-2')"></div>`;
                html += `<div class="port out" onmousedown="startWire(event, '${node.id}', 'out')"></div>`;
            }
            
            el.innerHTML = html;
            el.onmousedown = (e) => {
                if(e.target.classList.contains('port') || e.target.tagName==='BUTTON') return;
                dragging.node = node;
                dragging.hasMoved = false;
                const rect = el.getBoundingClientRect();
                dragging.offsetX = e.clientX - rect.left;
                dragging.offsetY = e.clientY - rect.top;
            };
            
            // Allow deleting nodes via right click
            el.oncontextmenu = (e) => {
                e.preventDefault();
                deleteNode(node.id);
            };
            
            nodesContainer.appendChild(el);
        });
        renderWires();
    }

    function toggleInput(id) {
        const node = state.nodes.find(n => n.id === id);
        if(node) {
            node.value = node.value === 1 ? 0 : 1;
            renderNodes();
            evaluateGraph();
            saveHistory();
        }
    }

    function startWire(e, nodeId, port) {
        e.stopPropagation();
        e.preventDefault();
        const rect = e.target.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();
        wiring.active = true;
        wiring.fromNode = nodeId;
        wiring.fromPort = port;
        wiring.startX = rect.left + rect.width/2 - canvasRect.left;
        wiring.startY = rect.top + rect.height/2 - canvasRect.top;
    }

    function endWire(e, nodeId, port) {
        e.stopPropagation();
        if(wiring.active && wiring.fromNode !== nodeId) {
            // Validate: Only connect 'out' to 'in'
            if ((wiring.fromPort.startsWith('out') && port.startsWith('in')) || 
                (wiring.fromPort.startsWith('in') && port.startsWith('out'))) {
                
                let outNode = wiring.fromPort.startsWith('out') ? wiring.fromNode : nodeId;
                let inNode = wiring.fromPort.startsWith('in') ? wiring.fromNode : nodeId;
                let inPort = wiring.fromPort.startsWith('in') ? wiring.fromPort : port;
                
                // Clear existing connection to this specific input port so it acts as a plug
                state.connections = state.connections.filter(c => !(c.toNode === inNode && c.toPort === inPort));
                
                state.connections.push({ fromNode: outNode, fromPort: 'out', toNode: inNode, toPort: inPort });
                evaluateGraph();
                saveHistory();
            }
        }
        wiring.active = false;
        renderWires();
    }

    function onMouseMove(e) {
        if (dragging.node) {
            dragging.hasMoved = true;
            const canvasRect = canvas.getBoundingClientRect();
            dragging.node.x = e.clientX - canvasRect.left - dragging.offsetX;
            dragging.node.y = e.clientY - canvasRect.top - dragging.offsetY;
            document.getElementById(dragging.node.id).style.left = dragging.node.x + 'px';
            document.getElementById(dragging.node.id).style.top = dragging.node.y + 'px';
            renderWires();
        } else if (wiring.active) {
            const canvasRect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - canvasRect.left;
            const mouseY = e.clientY - canvasRect.top;
            renderWires(mouseX, mouseY);
        }
    }

    function onMouseUp() {
        if (dragging.node) {
            if (dragging.hasMoved) {
                saveHistory();
            }
            dragging.node = null;
        }
        if(wiring.active) {
            wiring.active = false;
            renderWires();
        }
    }

    function deleteNode(id) {
        state.nodes = state.nodes.filter(n => n.id !== id);
        state.connections = state.connections.filter(c => c.fromNode !== id && c.toNode !== id);
        renderNodes();
        evaluateGraph();
        saveHistory();
    }

    function getPortPosition(nodeId, port) {
        const el = document.getElementById(nodeId);
        if(!el) return null;
        const portEl = el.querySelector(`.port.${port}`);
        if(!portEl) return null;
        
        const rect = portEl.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();
        return {
            x: rect.left + rect.width/2 - canvasRect.left,
            y: rect.top + rect.height/2 - canvasRect.top
        };
    }

    function drawBezier(x1, y1, x2, y2, color, isFlowing) {
        const offset = Math.abs(x2 - x1) * 0.6 + 20;
        const className = isFlowing ? 'class="wire-active"' : '';
        return `<path ${className} d="M ${x1} ${y1} C ${x1 + offset} ${y1}, ${x2 - offset} ${y2}, ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" />`;
    }

    function renderWires(tempX, tempY) {
        let svg = '';
        state.connections.forEach(conn => {
            const p1 = getPortPosition(conn.fromNode, 'out');
            const p2 = getPortPosition(conn.toNode, conn.toPort);
            if(p1 && p2) {
                // Find signal value to color wire dynamically
                const sourceNode = state.nodes.find(n => n.id === conn.fromNode);
                const isHigh = sourceNode && sourceNode.value === 1;
                const color = isHigh ? '#22c55e' : '#cbd5e1'; // Green for 1, Gray for 0
                svg += drawBezier(p1.x, p1.y, p2.x, p2.y, color, isHigh);
            }
        });
        
        if (wiring.active && tempX !== undefined) {
            svg += drawBezier(wiring.startX, wiring.startY, tempX, tempY, '#3b82f6', false);
        }
        svgWires.innerHTML = svg;
    }

    function evaluateGraph() {
        // Recursive / multi-pass evaluation to properly settle combinational logic gates
        for(let iter=0; iter<state.nodes.length; iter++) {
            state.nodes.forEach(node => {
                if(node.type === 'input') return; // Handled by button toggles
                
                const inConns = state.connections.filter(c => c.toNode === node.id);
                
                if(node.type === 'output' || node.type === 'NOT') {
                    const conn = inConns.find(c => c.toPort === 'in');
                    let val = 0;
                    if(conn) {
                        const src = state.nodes.find(n => n.id === conn.fromNode);
                        val = src ? src.value : 0;
                    }
                    if(node.type === 'output') node.value = val;
                    if(node.type === 'NOT') node.value = val === 0 ? 1 : 0;
                } else { // 2-input gates
                    const c1 = inConns.find(c => c.toPort === 'in-1');
                    const c2 = inConns.find(c => c.toPort === 'in-2');
                    let v1 = 0, v2 = 0;
                    if(c1) { const src = state.nodes.find(n => n.id === c1.fromNode); v1 = src ? src.value : 0; }
                    if(c2) { const src = state.nodes.find(n => n.id === c2.fromNode); v2 = src ? src.value : 0; }
                    
                    switch(node.type) {
                        case 'AND': node.value = v1 & v2; break;
                        case 'OR': node.value = v1 | v2; break;
                        case 'XOR': node.value = v1 ^ v2; break;
                        case 'NAND': node.value = !(v1 & v2) ? 1 : 0; break;
                        case 'NOR': node.value = !(v1 | v2) ? 1 : 0; break;
                    }
                }
            });
        }
        renderNodes(); // Triggers a class update on UI to show colors
    }

    function clearCanvas() {
        state.nodes = [];
        state.connections = [];
        state.nextNodeId = 1;
        renderNodes();
        saveHistory();
    }

    function saveCircuit() {
        localStorage.setItem("logic_canvas", JSON.stringify(state));
        alert("Circuit successfully saved!");
    }

    function loadCircuit() {
        const savedInfo = localStorage.getItem("logic_canvas");
        if(savedInfo) {
            state = JSON.parse(savedInfo);
            renderNodes();
            evaluateGraph();
            saveHistory();
        } else {
            alert("No saved circuit found. Make sure to click Save first!");
        }
    }
    
    // Auto-spawn some initial nodes to show how it works
    if(state.nodes.length === 0) {
        addNode('input');
        addNode('input');
        addNode('AND');
        addNode('output');
        
        // Offset them automatically for the showcase
        state.nodes[0].x = 50; state.nodes[0].y = 100;
        state.nodes[1].x = 50; state.nodes[1].y = 250;
        state.nodes[2].x = 300; state.nodes[2].y = 150;
        state.nodes[3].x = 500; state.nodes[3].y = 150;
        
        // Setup initial wires to showcase it
        state.connections.push({ fromNode: state.nodes[0].id, fromPort: 'out', toNode: state.nodes[2].id, toPort: 'in-1' });
        state.connections.push({ fromNode: state.nodes[1].id, fromPort: 'out', toNode: state.nodes[2].id, toPort: 'in-2' });
        state.connections.push({ fromNode: state.nodes[2].id, fromPort: 'out', toNode: state.nodes[3].id, toPort: 'in' });

        renderNodes();
        evaluateGraph();

        // Initialize history with initial state
        saveHistory();
    }
    </script>
</body>
</html>
